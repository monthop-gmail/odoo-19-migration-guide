# Odoo 18 → 19 Migration Rules
# Machine-readable patterns for AI agents to detect and fix breaking changes.
#
# Structure per rule:
#   id:          unique identifier
#   title:       short description
#   severity:    error (will crash) | warning (deprecated, will break later) | info (style/convention)
#   file_types:  which files to scan
#   detect:      regex patterns to find problematic code
#   fix:         replacement logic
#   auto_fix:    true = safe to replace automatically, false = needs human review
#   false_positives: hints for avoiding wrong matches
#   error_message: the runtime error you'd see if unfixed

rules:

  # ──────────────────────────────────────────────
  # FIELD RENAMES
  # ──────────────────────────────────────────────

  - id: field-groups-users
    title: "res.groups: .users → .user_ids"
    severity: error
    file_types: ["*.py", "*.xml", "*.csv"]
    detect:
      - pattern: '\.users\b'
        context: "Look for res.groups recordset access. Ignore if .users is on a custom model."
      - pattern: '"users"'
        context: "Look for dict keys in create/write on res.groups"
      - pattern: "'users'"
        context: "Look for dict keys in create/write on res.groups"
    fix:
      replace: ".users → .user_ids, \"users\" → \"user_ids\", 'users' → 'user_ids'"
    auto_fix: false
    false_positives:
      - ".users could be a field on a custom model, not res.groups"
      - "Check the model context before replacing"
    error_message: "AttributeError: 'res.groups' object has no attribute 'users'"

  - id: field-users-groups-id
    title: "res.users: groups_id → group_ids"
    severity: error
    file_types: ["*.py", "*.xml", "*.csv"]
    affected_models: ["res.users", "ir.ui.view", "ir.ui.menu", "ir.actions", "ir.actions.report", "website.page.properties"]
    detect:
      - pattern: 'groups_id'
    fix:
      search: "groups_id"
      replace: "group_ids"
    auto_fix: true
    false_positives:
      - "Very unlikely — groups_id is specific to res.users and related models"
    error_message: "AttributeError: 'res.users' object has no attribute 'groups_id'"
    reference: "https://github.com/odoo/odoo/pull/179354"

  # ──────────────────────────────────────────────
  # API CHANGES
  # ──────────────────────────────────────────────

  - id: api-models-newid
    title: "models.NewId removed"
    severity: error
    file_types: ["*.py"]
    detect:
      - pattern: 'models\.NewId'
    fix:
      search: "isinstance(rec.id, models.NewId)"
      replace: "not isinstance(rec.id, int)"
      note: "Also remove 'from odoo import models' if NewId was the only reason for the import"
    auto_fix: true
    false_positives: []
    error_message: "AttributeError: module 'odoo.models' has no attribute 'NewId'"

  - id: api-read-group
    title: "read_group() → _read_group() with aggregates"
    severity: error
    file_types: ["*.py"]
    detect:
      - pattern: '\.read_group\s*\('
        context: "Exclude _read_group (already migrated)"
    fix:
      note: |
        1. Replace .read_group( with ._read_group(
        2. Move aggregated fields from 'fields' param to 'aggregates' param
        3. Change dict access (group["field"]) to tuple unpacking
        4. groupby fields now return recordsets, not (id, name) tuples
    auto_fix: false
    false_positives: []
    error_message: "DeprecationWarning or AttributeError on read_group"

  - id: api-internal-attrs-deprecated
    title: "Internal attributes _context/_cr/_uid → env.*"
    severity: warning
    file_types: ["*.py"]
    detect:
      - pattern: '\._context\b'
      - pattern: 'self\._cr\b'
      - pattern: 'self\._uid\b'
    fix:
      note: |
        ._context → .env.context
        self._cr → self.env.cr
        self._uid → self.env.uid
    auto_fix: true
    false_positives:
      - "Unlikely — these are Odoo-specific internal attributes"
    error_message: "DeprecationWarning: use .env.context/.env.cr/.env.uid instead"

  # ──────────────────────────────────────────────
  # FIELD DEFINITION CHANGES
  # ──────────────────────────────────────────────

  - id: field-auto-join
    title: "auto_join removed (One2many) or renamed (Many2one/Many2many)"
    severity: error
    file_types: ["*.py"]
    detect:
      - pattern: 'auto_join\s*=\s*True'
    fix:
      note: |
        - One2many: remove auto_join entirely
        - Many2one/Many2many: rename auto_join=True to bypass_search_access=True
        Check the field type before applying the fix.
    auto_fix: false
    false_positives: []
    error_message: "TypeError: __init__() got an unexpected keyword argument 'auto_join'"
    reference: "https://github.com/odoo/odoo/pull/219627"

  # ──────────────────────────────────────────────
  # METHOD CHANGES (manual review required)
  # ──────────────────────────────────────────────

  - id: method-button-draft
    title: "button_draft() no longer calls remove_move_reconcile()"
    severity: error
    file_types: ["*.py"]
    detect:
      - pattern: 'def button_draft\s*\('
    fix:
      note: |
        If the module overrides button_draft on account.move and relies on
        unreconciliation, add before super():
            self.mapped("line_ids").remove_move_reconcile()
    auto_fix: false
    false_positives:
      - "Only relevant for account.move overrides that depend on reconciliation"
    error_message: "Silent failure — CABA entries and reconciliation logic won't work"

  - id: method-compute-side-effects
    title: "Stored compute side effects don't persist on create()"
    severity: error
    file_types: ["*.py"]
    detect:
      - pattern: '@api\.depends'
        context: "Check if the compute method writes to fields OTHER than the computed field"
    fix:
      note: |
        Look for patterns where a @api.depends compute method writes to
        non-computed fields as side effects. These writes won't persist
        during create() in Odoo 19.
        Fix: move side-effect writes to a separate method called after create().
    auto_fix: false
    false_positives:
      - "Only problematic if the compute writes to fields it doesn't compute"

  # ──────────────────────────────────────────────
  # TEST CHANGES
  # ──────────────────────────────────────────────

  - id: test-company-name
    title: "Test company names must be unique"
    severity: error
    file_types: ["*.py"]
    detect:
      - pattern: 'create\(\s*\{\s*"name"\s*:\s*"My Company"'
      - pattern: "create\\(\\s*\\{\\s*'name'\\s*:\\s*'My Company'"
    fix:
      note: "Change 'My Company' to a unique test name like 'Test Company <ModuleName>'"
    auto_fix: false
    false_positives: []
    error_message: "UniqueViolation: duplicate key value violates unique constraint 'res_company_name_uniq'"

  - id: test-psycopg
    title: "psycopg2 imports need psycopg3 fallback"
    severity: warning
    file_types: ["*.py"]
    detect:
      - pattern: 'from psycopg2 import'
      - pattern: 'import psycopg2'
    fix:
      note: |
        Wrap with try/except:
            try:
                from psycopg2 import IntegrityError
            except ImportError:
                from psycopg import errors
                IntegrityError = errors.IntegrityError
    auto_fix: false
    false_positives: []
    error_message: "ModuleNotFoundError: No module named 'psycopg2'"

  - id: test-caba-assertions
    title: "CABA test assertions: draft entries are deleted, not reversed"
    severity: error
    file_types: ["*.py"]
    detect:
      - pattern: 'tax_cash_basis_created_move_ids'
        context: "Check if test asserts count or existence after draft"
    fix:
      note: |
        In Odoo 19, draft CABA entries are DELETED (not reversed).
        Change assertions like assertEqual(len(caba), 2) to assertFalse(caba).
    auto_fix: false
    false_positives:
      - "Only relevant if the test sets entries to draft and then checks CABA"

  # ──────────────────────────────────────────────
  # CODE STYLE
  # ──────────────────────────────────────────────

  - id: style-lazy-translation
    title: "Lazy translation formatting (W8301)"
    severity: warning
    file_types: ["*.py"]
    detect:
      - pattern: '_\(\s*"[^"]*"\s*%'
        context: "String formatting before translation"
      - pattern: '_\(\s*"[^"]*"\.format\('
        context: ".format() inside translation"
      - pattern: '_\(\s*"[^"]*"\s*\+'
        context: "String concatenation inside translation"
    fix:
      note: |
        Change to: _("Message %s", variable) or _("Message %(name)s", name=variable)
    auto_fix: false
    false_positives: []
    error_message: "pre-commit ruff W8301"

  # ──────────────────────────────────────────────
  # DOMAIN & EXPRESSION CHANGES
  # ──────────────────────────────────────────────

  - id: domain-expression-api
    title: "odoo.osv.expression → odoo.fields.Domain"
    severity: error
    file_types: ["*.py"]
    detect:
      - pattern: 'from odoo\.osv import expression'
      - pattern: 'from odoo\.osv\.expression import'
      - pattern: 'expression\.AND\('
      - pattern: 'expression\.OR\('
      - pattern: 'expression\.normalize_domain\('
    fix:
      note: |
        Replace:
          from odoo.osv import expression → from odoo.fields import Domain (or from odoo import Domain)
          expression.AND([d1, d2]) → Domain(d1) & Domain(d2)
          expression.OR([d1, d2]) → Domain(d1) | Domain(d2)
    auto_fix: false
    false_positives: []
    error_message: "ImportError or DeprecationWarning on odoo.osv.expression"
    reference: "https://github.com/odoo/odoo/pull/217708"

  - id: domain-empty-list
    title: "Domain with empty list handling"
    severity: warning
    file_types: ["*.py"]
    detect:
      - pattern: '"not in"\s*,\s*\[\]'
      - pattern: "'not in'\\s*,\\s*\\[\\]"
      - pattern: '"not in"\s*,\s*res_ids'
        context: "Check if res_ids could be empty"
    fix:
      note: |
        Handle empty lists explicitly:
            if not res_ids:
                return [(1, "=", 1)]  # matches all
            return [("id", "not in", res_ids)]
    auto_fix: false
    false_positives:
      - "Only problematic if the list can actually be empty at runtime"

  # ──────────────────────────────────────────────
  # MODEL DEFINITION CHANGES
  # ──────────────────────────────────────────────

  - id: model-sql-constraints
    title: "_sql_constraints → models.Constraint / models.Index"
    severity: error
    file_types: ["*.py"]
    detect:
      - pattern: '_sql_constraints\s*='
    fix:
      note: |
        Replace _sql_constraints list with _constraints list using models.Constraint:
          _sql_constraints = [("name_uniq", "unique(name)", "Msg")]
        becomes:
          _constraints = [models.Constraint("unique(name)", "Msg")]
    auto_fix: false
    false_positives: []
    reference: "https://github.com/odoo/odoo/pull/175783"

  # ──────────────────────────────────────────────
  # CONTROLLER CHANGES
  # ──────────────────────────────────────────────

  - id: controller-route-json
    title: 'Route type="json" → type="jsonrpc"'
    severity: error
    file_types: ["*.py"]
    detect:
      - pattern: 'type\s*=\s*["\x27]json["\x27]'
        context: "In @route decorators"
    fix:
      search: 'type="json"'
      replace: 'type="jsonrpc"'
    auto_fix: true
    false_positives:
      - "Make sure it's in a @route decorator, not a generic string"
    error_message: "ValueError: Unknown route type 'json'"
    reference: "https://github.com/odoo/odoo/pull/183636"

  # ──────────────────────────────────────────────
  # METHOD / DECORATOR CHANGES
  # ──────────────────────────────────────────────

  - id: method-toggle-active
    title: "toggle_active → action_archive / action_unarchive"
    severity: error
    file_types: ["*.py"]
    detect:
      - pattern: 'toggle_active'
    fix:
      note: |
        Replace toggle_active() calls with action_archive() or action_unarchive().
        If overriding toggle_active, move logic to action_archive/action_unarchive.
    auto_fix: false
    false_positives:
      - "Check if it's an override (def toggle_active) or a call (.toggle_active())"
    reference: "https://github.com/odoo/odoo/pull/183691"

  - id: decorator-ormcache-context
    title: "@ormcache_context → @ormcache"
    severity: error
    file_types: ["*.py"]
    detect:
      - pattern: 'ormcache_context'
    fix:
      note: |
        Replace @ormcache_context(keys=("lang",)) with:
          @ormcache("self.env.context.get('lang')")
        Also update imports: remove ormcache_context, ensure ormcache is imported.
    auto_fix: false
    false_positives: []
    reference: "https://github.com/odoo/odoo/pull/220725"

  - id: import-superuser-id
    title: "SUPERUSER_ID import moved to odoo.api"
    severity: error
    file_types: ["*.py"]
    detect:
      - pattern: 'from odoo import.*SUPERUSER_ID'
    fix:
      search: "from odoo import SUPERUSER_ID"
      replace: "from odoo.api import SUPERUSER_ID"
      note: "If importing multiple names (from odoo import api, SUPERUSER_ID), split them."
    auto_fix: false
    false_positives: []
    reference: "https://github.com/odoo/odoo/commit/d6a955f10483"

  # ──────────────────────────────────────────────
  # TIMEZONE
  # ──────────────────────────────────────────────

  - id: timezone-env-tz
    title: "context.get('tz') / pytz → self.env.tz"
    severity: warning
    file_types: ["*.py"]
    detect:
      - pattern: "context\\.get\\(['\"]tz['\"]\\)"
      - pattern: 'pytz\.timezone'
    fix:
      note: |
        Replace manual timezone resolution with self.env.tz:
          pytz.timezone(self.env.context.get("tz") or "UTC") → self.env.tz
    auto_fix: false
    false_positives:
      - "pytz may be used for non-user timezone purposes"
    reference: "https://github.com/odoo/odoo/pull/221541"

  # ──────────────────────────────────────────────
  # TEST CHANGES (additional)
  # ──────────────────────────────────────────────

  - id: test-fake-model-loader
    title: "FakeModelLoader → native add_to_registry"
    severity: warning
    file_types: ["*.py"]
    detect:
      - pattern: 'FakeModelLoader'
      - pattern: 'odoo_test_helper'
    fix:
      note: |
        Replace odoo-test-helper FakeModelLoader with native:
          from odoo.orm.model_classes import add_to_registry
          add_to_registry(cls.registry, FakeModel)
          cls.registry._setup_models_(cls.env.cr, ["fake.model"])
          cls.registry.init_models(cls.env.cr, ["fake.model"], {"models_to_check": True})
          cls.addClassCleanup(cls.registry.__delitem__, "fake.model")
    auto_fix: false
    false_positives: []

  - id: test-demo-data
    title: "Demo data not installed by default in tests"
    severity: warning
    file_types: ["*.py"]
    detect:
      - pattern: 'self\.env\.ref\('
        context: "Check if referencing demo data (base.res_partner_, base.res_company_, etc.)"
    fix:
      note: |
        In Odoo 19, demo data is not installed by default in tests.
        Replace self.env.ref("base.res_partner_1") with explicit create().
    auto_fix: false
    false_positives:
      - "env.ref is also used for non-demo XML IDs (views, groups, etc.) — those are fine"

  # ──────────────────────────────────────────────
  # SEARCH FUNCTION CHANGES
  # ──────────────────────────────────────────────

  - id: search-function-operator-rewriting
    title: "Search functions must handle 'in' operator (optimizer rewrites '=' to 'in')"
    severity: error
    file_types: ["*.py"]
    detect:
      - pattern: 'def _search_\w+\(self, operator, value\)'
        context: "Check if the search function only handles '=' but not 'in' operator"
      - pattern: 'operator\s*==\s*["\x27]=["\x27]'
        context: "Inside a _search_ method — may need to also check for 'in' operator"
    fix:
      note: |
        In Odoo 19, the domain optimizer rewrites ("field", "=", val) to ("field", "in", [val])
        BEFORE the search function is called. Search functions must handle both:
            if (operator == "=" and value is False) or (operator == "in" and value == [False]):
                value = False  # normalize back
                ...
        Also normalize value when the optimizer wraps it in a list.
    auto_fix: false
    false_positives:
      - "operator == '=' checks outside of _search_ methods are not affected"
      - "Only relevant for computed non-stored fields with a search parameter"

  # ──────────────────────────────────────────────
  # CLEANUP
  # ──────────────────────────────────────────────

  # ──────────────────────────────────────────────
  # PARTNER TITLE CHANGES
  # ──────────────────────────────────────────────

  - id: field-partner-title-removed
    title: "res.partner.title removed from base — use partner_title module (title_id)"
    severity: error
    file_types: ["*.py", "*.xml"]
    detect:
      - pattern: '\.title\b'
        context: "On res.partner records — .title is removed. Use .title_id (from OCA partner_title module)"
      - pattern: '@api\.depends\(.*["\x27]title["\x27]'
        context: "Depends on title field — should be title_id"
      - pattern: '"title"\s*:'
        context: "In create/write dicts for res.partner"
    fix:
      note: |
        1. Add "partner_title" to __manifest__.py depends
        2. Replace .title with .title_id in code
        3. Replace "title" with "title_id" in XML views and search domains
    auto_fix: false
    false_positives:
      - ".title could be a field on a non-partner model"
      - "Check model context before replacing"
    error_message: "ValueError: Dependency field 'title' not found in model res.partner"

  # ──────────────────────────────────────────────
  # SAFE_EVAL CHANGES
  # ──────────────────────────────────────────────

  - id: api-safe-eval-globals-dict
    title: "safe_eval() globals_dict → context"
    severity: error
    file_types: ["*.py"]
    detect:
      - pattern: 'globals_dict\s*='
        context: "In safe_eval() calls"
    fix:
      search: "globals_dict="
      replace: "context="
    auto_fix: true
    false_positives: []
    error_message: "TypeError: safe_eval() got an unexpected keyword argument 'globals_dict'"

  # ──────────────────────────────────────────────
  # REMOVED XML IDS
  # ──────────────────────────────────────────────

  - id: test-user-demo-removed
    title: "base.user_demo XML ID removed"
    severity: error
    file_types: ["*.py"]
    detect:
      - pattern: 'env\.ref\(["\x27]base\.user_demo["\x27]\)'
    fix:
      note: |
        Create test user explicitly:
          self.env["res.users"].create({
              "name": "Test User", "login": "test_user", "email": "test@example.com"
          })
    auto_fix: false
    false_positives: []
    error_message: "ValueError: External ID not found in the system: base.user_demo"

  # ──────────────────────────────────────────────
  # HR MODULE CHANGES
  # ──────────────────────────────────────────────

  - id: model-hr-expense-sheet-removed
    title: "hr.expense.sheet model removed — use hr.expense directly"
    severity: error
    file_types: ["*.py", "*.xml", "*.csv"]
    detect:
      - pattern: 'hr\.expense\.sheet'
    fix:
      note: |
        hr.expense.sheet is completely removed in Odoo 19.
        Rewrite all logic to use hr.expense directly.
        Update models, views, security rules, and tests.
    auto_fix: false
    false_positives: []
    error_message: "KeyError: 'hr.expense.sheet' or model not found errors"

  - id: model-hr-employee-base-removed
    title: "hr.employee.base abstract model removed — use hr.employee"
    severity: error
    file_types: ["*.py"]
    detect:
      - pattern: 'hr\.employee\.base'
    fix:
      search: "hr.employee.base"
      replace: "hr.employee"
      note: "Also check that your module depends on 'hr' if it didn't before"
    auto_fix: true
    false_positives: []
    error_message: "KeyError: 'hr.employee.base' or MissingError"

  - id: field-user-department-id-moved
    title: "department_id moved from res.users to hr.employee"
    severity: error
    file_types: ["*.py"]
    detect:
      - pattern: 'user\w*\.department_id'
        context: "On res.users records — department_id is now on hr.employee"
    fix:
      note: |
        Access via employee record instead:
          user.department_id → user.employee_id.department_id
        In tests, create hr.employee records linked to users for department assignment.
    auto_fix: false
    false_positives:
      - "Could be accessing department_id on an hr.employee record, which is fine"

  # ──────────────────────────────────────────────
  # CLEANUP
  # ──────────────────────────────────────────────

  # ──────────────────────────────────────────────
  # CREATE / MULTI-CREATE API
  # ──────────────────────────────────────────────

  - id: create-vals-list
    title: "create(self, vals) → create(self, vals_list) — multi-create API"
    severity: error
    file_types: ["*.py"]
    detect:
      - pattern: 'def create\(self,\s*vals\)'
        context: "Check if the override calls vals.get() or treats vals as a single dict"
      - pattern: 'vals\.get\('
        context: "Inside a create() override — vals is now a list of dicts"
    fix:
      note: |
        Rename parameter to vals_list and iterate:
            def create(self, vals_list):
                if not isinstance(vals_list, list):
                    vals_list = [vals_list]
                for vals in vals_list:
                    if vals.get('key'):
                        ...
                return super().create(vals_list)
    auto_fix: false
    false_positives:
      - "vals.get() outside of a create() override is not affected"
    error_message: "AttributeError: 'list' object has no attribute 'get'"

  # ──────────────────────────────────────────────
  # RES.GROUPS CATEGORY → PRIVILEGE
  # ──────────────────────────────────────────────

  - id: field-groups-category-id
    title: "res.groups: category_id → privilege_id via res.groups.privilege"
    severity: error
    file_types: ["*.xml", "*.py"]
    detect:
      - pattern: 'category_id'
        context: "ONLY on res.groups records — category_id is replaced by privilege_id. First check _name = 'res.groups' or model='res.groups' before flagging."
    fix:
      note: |
        1. Create a res.groups.privilege record with the category_id
        2. Replace category_id on res.groups with privilege_id pointing to the privilege record
    auto_fix: false
    false_positives:
      - "category_id on other models (ir.module.category, product.category, etc.) is not affected"
      - "Custom category models (e.g. legal.form.category, event.type.category) are very common — verify model context before flagging"
      - "High false-positive rate: a module with its own category system can generate 50-100+ hits, all false positives"
    error_message: "ValueError: Invalid field 'category_id' in 'res.groups'"

  # ──────────────────────────────────────────────
  # ACTION TARGET INLINE
  # ──────────────────────────────────────────────

  - id: action-target-inline
    title: "ir.actions.act_window: target='inline' → target='main'"
    severity: error
    file_types: ["*.xml", "*.py"]
    detect:
      - pattern: 'target.*inline'
        context: "In ir.actions.act_window records"
    fix:
      search: "inline"
      replace: "main"
      note: "Only in ir.actions.act_window target field"
    auto_fix: true
    false_positives:
      - "The word 'inline' in comments or non-action contexts"
    error_message: "ValueError: Invalid target 'inline' for ir.actions.act_window"

  # ──────────────────────────────────────────────
  # SEARCH VIEW GROUP ATTRIBUTES
  # ──────────────────────────────────────────────

  - id: search-view-group-attrs
    title: "Search view <group> elements: string/expand attributes removed"
    severity: error
    file_types: ["*.xml"]
    detect:
      - pattern: '<group\s+expand='
        context: "ONLY in search views (arch_type='search') — expand attribute no longer supported. <group> in form/tree views is NOT affected."
      - pattern: '<group\s+string='
        context: "ONLY in search views — string attribute no longer supported on <group>. Form views use <group string=...> normally — do NOT touch those."
      - pattern: '<group\s+expand=.*string='
    fix:
      note: |
        Remove string and expand attributes from <group> elements in search views ONLY:
            <group expand="0" string="Group By"> → <group>
        IMPORTANT: Do NOT remove string= from <group> in form views — those are still valid.
        To identify search views, look for the parent <search> element or arch_type="search".
    auto_fix: false
    false_positives:
      - "group elements in form/tree views still support string= — only search views changed"
      - "High false-positive rate: <group string=...> in form views is very common and must NOT be changed"

  # ──────────────────────────────────────────────
  # IR.DEFAULT TRANSIENT MODEL
  # ──────────────────────────────────────────────

  - id: ir-default-transient
    title: "ir.default.set broken for TransientModel fields"
    severity: warning
    file_types: ["*.xml", "*.py"]
    detect:
      - pattern: 'ir\.default'
        context: "Check if setting defaults for TransientModel fields (e.g. res.config.settings)"
    fix:
      note: |
        ir.default.set via XML function calls no longer works for TransientModel fields
        because the field_id lookup returns null.
        Use Python defaults or ir.config_parameter instead.
    auto_fix: false
    false_positives:
      - "ir.default.set for regular Model fields still works"

  # ──────────────────────────────────────────────
  # CORE FIELD REMOVALS
  # ──────────────────────────────────────────────

  - id: field-removals-core
    title: "Field removals/renames in core models (Webkul/Marketplace-relevant)"
    severity: error
    file_types: ["*.py", "*.xml"]
    detect:
      - pattern: 'stock\.move.*\bname\b'
        context: "stock.move.name → reference"
      - pattern: 'product_uom_category_id'
        context: "Removed from stock.move and sale.order.line"
      - pattern: 'product_uom\b'
        context: "sale.order.line.product_uom → product_uom_id"
      - pattern: 'procurement_group_id'
        context: "Removed from sale.order"
      - pattern: 'uom_po_id'
        context: "Removed from product.template"
      - pattern: '_get_default_category_id'
        context: "Removed from product.template"
    fix:
      note: |
        Key renames:
          stock.move.name → reference
          sale.order.line.product_uom → product_uom_id
        Key removals:
          stock.picking.date (use scheduled_date), stock.picking.group_id,
          stock.move.product_uom_category_id, sale.order.line.product_uom_category_id,
          sale.order.procurement_group_id, product.template.uom_po_id,
          product.template._get_default_category_id(), res.partner.mobile
    auto_fix: false
    false_positives:
      - "product_uom could be a custom field on another model"
      - "name on stock.move could be in unrelated context"

  # ──────────────────────────────────────────────
  # XML ID CHANGES
  # ──────────────────────────────────────────────

  - id: xml-id-changes
    title: "XML ID changes in core modules"
    severity: error
    file_types: ["*.py", "*.xml", "*.csv"]
    detect:
      - pattern: 'product\.product_category_all'
        context: "Renamed to product.product_category_goods"
      - pattern: 'product\.group_discount_per_so_line'
        context: "Moved to sale.group_discount_per_so_line"
    fix:
      note: |
        product.product_category_all → product.product_category_goods
        product.group_discount_per_so_line → sale.group_discount_per_so_line
    auto_fix: false
    false_positives: []
    error_message: "ValueError: External ID not found in the system"

  # ──────────────────────────────────────────────
  # CONSTRAINTS LIST FORMAT
  # ──────────────────────────────────────────────

  - id: constraints-list-format
    title: "_constraints list-of-tuples format → named class attributes with models.Constraint"
    severity: error
    file_types: ["*.py"]
    detect:
      - pattern: '_constraints\s*=\s*\['
        context: "Old _constraints list format — must use named class attributes"
    fix:
      note: |
        Replace _constraints list with named class attributes:
            _constraints = [('name_uniq', 'unique(name)', 'Msg')]
        becomes:
            _name_uniq = models.Constraint('unique(name)', 'Msg')
        Note: this is different from _sql_constraints migration (see model-sql-constraints rule).
    auto_fix: false
    false_positives: []

  - id: cleanup-migrations-folder
    title: "Delete old migrations/ folder"
    severity: info
    file_types: []
    detect:
      - pattern: "migrations/"
        context: "Check if a migrations/ directory exists in the module"
    fix:
      note: "Delete the entire migrations/ folder — historical upgrade scripts should not be carried forward."
    auto_fix: false
    false_positives: []

# ──────────────────────────────────────────────
# VERSION BUMP (always apply)
# ──────────────────────────────────────────────

version_bump:
  manifest:
    detect: 'version.*18\.0\.'
    fix:
      search: '18.0.\d+\.\d+\.\d+'
      replace: "19.0.1.0.0"
  readme:
    detect: '18\.0'
    files: ["README.rst", "README.md", "static/description/index.html"]
    fix:
      search: "18.0"
      replace: "19.0"
      note: "Also check other markdown docs (USER_GUIDE.md, CONTRIBUTING.md, etc.) for version references"

# ──────────────────────────────────────────────
# POST-MIGRATION VALIDATION
# ──────────────────────────────────────────────

validation:
  must_not_exist:
    - pattern: 'groups_id'
      exception: "custom field named groups_id (not res.users)"
    - pattern: 'models\.NewId'
    - pattern: 'auto_join\s*=\s*True'
    - pattern: '\._context\b'
    - pattern: 'self\._cr\b'
    - pattern: 'self\._uid\b'
    - pattern: '\.read_group\s*\('
      exception: "._read_group( is OK"
    - pattern: 'from odoo\.osv import expression'
    - pattern: '_sql_constraints\s*='
    - pattern: 'type\s*=\s*"json"'
      scope: "@route decorators only"
    - pattern: 'toggle_active'
    - pattern: 'ormcache_context'
    - pattern: 'from odoo import.*SUPERUSER_ID'
    - pattern: 'FakeModelLoader'
    - pattern: 'globals_dict\s*='
      scope: "safe_eval() calls only"
    - pattern: 'env\.ref\(["\x27]base\.user_demo["\x27]\)'
    - pattern: 'hr\.expense\.sheet'
    - pattern: 'hr\.employee\.base'
    - pattern: 'target.*inline'
      scope: "ir.actions.act_window target field only"
    - pattern: 'product\.product_category_all'
    - pattern: 'product\.group_discount_per_so_line'

  must_exist:
    - pattern: "version.*19\\.0"
      file: "__manifest__.py"
      message: "Version must be updated to 19.0.x.x.x"

  directories_must_not_exist:
    - path: "migrations/"
      message: "Delete old migrations/ folder"
